# ══════════════════════════════════════════════════════════════
#   MockIQ — application.yml
#   Base configuration — shared across ALL profiles (dev + prod)
#
#   IMPORTANT: Zero secrets in this file.
#   All sensitive values read from environment variables.
#   Local dev: set vars in IntelliJ Run Configuration or .env
#   Production: set vars in Render dashboard
# ══════════════════════════════════════════════════════════════

spring:

  application:
    name: mockiq-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── MySQL Connection ──────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mockiq_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ──────────────────────────────────────
  jpa:
    hibernate:
      # dev  → update  (safe for local, won't drop data)
      # prod → validate (Hibernate only checks, never changes schema)
      ddl-auto: ${JPA_DDL_AUTO:update}

    show-sql: ${JPA_SHOW_SQL:true}

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  # ── Jackson ───────────────────────────────────────────────
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

  # ── File Upload Limits ────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

# ── Server ────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-stacktrace: never

# ── Custom App Config ─────────────────────────────────────
app:

  jwt:
    # Generate a strong secret: openssl rand -hex 64
    secret: ${JWT_SECRET:mockiq-local-dev-secret-change-this-in-production-min-32-chars}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
    folder: ${CLOUDINARY_FOLDER:mockiq/resumes}

  gemini:
    api-key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
    max-output-tokens: 8192
    temperature: 0.3

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    com.mockiq: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:DEBUG}
    root: INFO

# ── Swagger / OpenAPI ─────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true